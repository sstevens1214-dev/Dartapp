<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Darts — 501 & Golf</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .hidden { display: none; }
        .active { color: #00ff88; font-weight: bold; }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            background: #222;
            max-height: 300px;
            overflow-y: auto;
        }

        th, td {
            padding: 6px 10px;
            border: 1px solid #444;
        }

        #golf-board svg {
            overflow: visible;
        }

        button {
            padding: 8px 16px;
            margin: 5px;
            background: #444;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #666;
        }

        input {
            margin: 3px;
            padding: 4px 6px;
        }

        /* Highlight active hole segment */
        .golf-active-segment path {
            filter: drop-shadow(0 0 8px #00ff88);
            stroke: #00ff88 !important;
            stroke-width: 2 !important;
        }

        /* Highlight active number */
        .golf-active-number {
            fill: #00ff88 !important;
            font-weight: bold;
        }

        /* Utility */
        .hidden {
            display: none;
        }

        /* ============================
           PDC‑STYLE 501 — LAYOUT
        ============================= */

        .pdc501-container {
            padding: 20px;
            background: #f5f5f5;
            border-radius: 12px;
            border: 1px solid #d0d0d0;
            max-width: 1100px;
            margin: 0 auto;
            font-family: Arial, sans-serif;
            color: #000;
        }

        /* HEADER */
        .pdc501-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .pdc501-start-options {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pdc501-start-options label {
            color: #222;
            font-weight: 600;
        }

        .pdc501-start-options select,
        .pdc501-start-options input {
            padding: 6px 10px;
            font-size: 14px;
            background: #fff;
            border: 2px solid #ccc;
            color: #000;
            font-weight: 500;
        }

        /* SCOREBOARD LAYOUT */
        .pdc501-scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* PLAYER PANELS */
        .pdc501-player {
            background: #ffffff;
            border: 2px solid #b5b5b5;
            border-radius: 12px;
            padding: 15px;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .pdc501-player.active-player {
            border-color: #0078ff;
            box-shadow: 0 0 12px rgba(0, 120, 255, 0.35);
        }

        /* NAME ROW */
        .pdc501-name-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pdc501-name-row input {
            font-size: 20px;
            font-weight: bold;
            border: none;
            background: transparent;
            width: 160px;
            color: #222;
        }

        .throw-indicator {
            font-size: 22px;
            color: #0078ff;
        }

        /* BIG SCORE */
        .pdc501-bigscore {
            font-size: 64px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0 5px;
            color: #000;
            text-shadow: 0 0 4px rgba(0,0,0,0.15);
        }

        /* STATS */
        .pdc501-stats {
            margin-top: 5px;
            font-size: 14px;
            color: #333;
            opacity: 1;
            font-weight: 500;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px 10px;
        }

        /* CHECKOUT SUGGESTION */
        .pdc501-checkout {
            text-align: center;
            font-size: 16px;
            color: #0055cc;
            font-weight: 600;
            margin-top: 8px;
        }

        /* HISTORY BOX */
        .pdc501-history-box {
            margin-top: 12px;
            background: #ffffff;
            border: 1px solid #c8c8c8;
            border-radius: 8px;
            padding: 8px;
        }

        .pdc501-history-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .pdc501-history-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            font-size: 13px;
            color: #111;
        }

        .pdc501-history-cell {
            text-align: center;
            padding: 2px 0;
        }

        /* INPUT PANEL + KEYPAD */
        .pdc501-input-panel {
            margin-top: 10px;
        }

        .pdc501-input-panel input {
            width: 200px;
            padding: 10px;
            font-size: 20px;
            margin-bottom: 10px;
            background: #fff;
            border: 2px solid #ccc;
            color: #000;
        }

        /* NUMERIC KEYPAD 0–9 */
        .pdc501-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 260px;
            margin: 0 auto;
        }

        .pdc501-keypad button {
            padding: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: 2px solid #ccc;
            background: #fafafa;
            cursor: pointer;
            color: #000;
            font-weight: 600;
        }

        .pdc501-keypad button:hover {
            background: #e2e2e2;
        }

        /* GOLF STYLING */
        .golf-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .golf-banner-icon {
            font-size: 28px;
        }

        .golf-banner-title {
            font-size: 24px;
            font-weight: bold;
        }

        .golf-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            margin-top: 10px;
        }

        #golf-board-wrapper {
            background: #000;
            padding: 10px;
            border-radius: 8px;
        }

        .golf-side-panel {
            min-width: 160px;
            background: #222;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .golf-side-icon {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .golf-side-text {
            font-size: 16px;
        }

        .golf-info-box {
            margin-top: 10px;
            padding: 10px;
            background: #222;
            border-radius: 8px;
        }

        /* Golf current player highlight */
        .golf-current-player {
            background: #004422;
        }

        /* Make score table scrollable if tall */
        #golf-score {
            display: block;
            max-height: 260px;
            overflow-y: auto;
        }

        #golf-score table {
            width: 100%;
        }
    </style>
</head>

<body>

    <h1>Darts Game — 501 & Golf</h1>

    <!-- MODE SELECT + START GAME -->
    <div id="mode-select">
        <label for="game-mode">Game Mode:</label>
        <select id="game-mode">
            <option value="501">501</option>
            <option value="golf">Golf</option>
        </select>

        <button id="start-game-btn" onclick="startGame()">Start Game</button>
    </div>

    <p id="status"></p>

    <!-- PLAYER NAMES FOR 501 -->
    <div id="names-501">
        <input id="name-p1" placeholder="Player 1 name">
        <input id="name-p2" placeholder="Player 2 name">
    </div>

    <!-- 501 GAME AREA -->
    <div id="game-area-501" class="hidden pdc501-container">

        <!-- HEADER -->
        <div class="pdc501-header">
            <h2>501 Match</h2>

            <div class="pdc501-start-options">
                <label>Start Score:</label>
                <select id="start-score">
                    <option value="301">301</option>
                    <option value="501" selected>501</option>
                    <option value="701">701</option>
                    <option value="1001">1001</option>
                    <option value="custom">Custom…</option>
                </select>

                <input id="custom-start-score" type="number" placeholder="Enter score" class="hidden">

                <label>Legs to win:</label>
                <input id="legs-to-win" type="number" value="3" min="1" style="width:60px;">
            </div>
        </div>

        <!-- SCOREBOARD -->
        <div class="pdc501-scoreboard">

            <!-- PLAYER 1 -->
            <div class="pdc501-player" id="p1-panel">
                <div class="pdc501-name-row">
                    <input id="p1-name-input" value="Player 1">
                    <span id="p1-throw-indicator" class="throw-indicator hidden">•</span>
                </div>

                <div class="pdc501-bigscore" id="p1-score">501</div>

                <div class="pdc501-stats">
                    <div>Legs: <span id="p1-legs">0</span></div>
                    <div>Avg (Leg): <span id="p1-leg-avg">0.00</span></div>
                    <div>Avg (Match): <span id="p1-set-avg">0.00</span></div>
                    <div>Checkout %: <span id="p1-co">0%</span></div>
                </div>

                <div class="pdc501-checkout" id="p1-checkout">No checkout</div>

                <div class="pdc501-history-box">
                    <div class="pdc501-history-title">History</div>
                    <div class="pdc501-history-grid" id="p1-history-grid"></div>
                </div>
            </div>

            <!-- PLAYER 2 -->
            <div class="pdc501-player" id="p2-panel">
                <div class="pdc501-name-row">
                    <input id="p2-name-input" value="Player 2">
                    <span id="p2-throw-indicator" class="throw-indicator hidden">•</span>
                </div>

                <div class="pdc501-bigscore" id="p2-score">501</div>

                <div class="pdc501-stats">
                    <div>Legs: <span id="p2-legs">0</span></div>
                    <div>Avg (Leg): <span id="p2-leg-avg">0.00</span></div>
                    <div>Avg (Match): <span id="p2-set-avg">0.00</span></div>
                    <div>Checkout %: <span id="p2-co">0%</span></div>
                </div>

                <div class="pdc501-checkout" id="p2-checkout">No checkout</div>

                <div class="pdc501-history-box">
                    <div class="pdc501-history-title">History</div>
                    <div class="pdc501-history-grid" id="p2-history-grid"></div>
                </div>
            </div>

        </div>

        <!-- INPUT PANEL -->
        <div class="pdc501-input-panel">
            <input id="score-input" type="number" placeholder="Enter score">

            <div class="pdc501-keypad">
                <button class="kp" data-digit="1">1</button>
                <button class="kp" data-digit="2">2</button>
                <button class="kp" data-digit="3">3</button>
                <button class="kp" data-digit="4">4</button>
                <button class="kp" data-digit="5">5</button>
                <button class="kp" data-digit="6">6</button>
                <button class="kp" data-digit="7">7</button>
                <button class="kp" data-digit="8">8</button>
                <button class="kp" data-digit="9">9</button>
                <button class="kp" data-digit="0">0</button>

                <button id="kp-clear">Clear</button>
                <button id="kp-undo">Undo</button>
                <button id="kp-enter">Enter</button>
            </div>
        </div>

        <!-- HISTORY -->
        <div class="pdc501-history">
            <h3>Leg History</h3>
            <div id="history-p1" class="history-row"></div>
            <div id="history-p2" class="history-row"></div>
        </div>

    </div>

    <!-- GOLF GAME AREA -->
    <div id="golf-area" class="hidden">

        <!-- Back to menu -->
        <button id="golf-back-btn" onclick="returnToMenu()">Back to Menu</button>

        <!-- Golf Banner -->
        <div class="golf-banner">
            <div class="golf-banner-icon">⛳</div>
            <div class="golf-banner-title">Darts Golf</div>
        </div>

        <!-- Golf Player Setup -->
        <div id="golf-setup">
            <h3>Enter Player Names</h3>
            <div>
                <input id="golf-name-1" placeholder="Player 1">
                <input id="golf-name-2" placeholder="Player 2">
                <input id="golf-name-3" placeholder="Player 3">
                <input id="golf-name-4" placeholder="Player 4">
                <input id="golf-name-5" placeholder="Player 5">
                <input id="golf-name-6" placeholder="Player 6">
                <input id="golf-name-7" placeholder="Player 7">
                <input id="golf-name-8" placeholder="Player 8">
            </div>

            <button id="start-golf-btn" onclick="startGolf()">Start Golf</button>
        </div>

        <!-- Hole Panel -->
        <div id="golf-hole-panel">
            <span id="golf-hole-title"></span>
            <span class="golf-hole-icon">⛳</span>
        </div>

        <!-- Layout: Board + Side Panel -->
        <div class="golf-layout">

            <!-- Dartboard -->
            <div id="golf-board-wrapper">
                <svg id="golf-board" width="500" height="500" viewBox="-200 -200 400 400">
                    <g id="golf-target-group"></g>
                    <g id="golf-bull-group"></g>
                    <g id="golf-number-ring"></g>
                </svg>
            </div>

            <!-- Side Panel -->
            <div class="golf-side-panel">
                <div class="golf-side-icon">⛳</div>
                <div class="golf-side-text">Golf Mode Active</div>
            </div>

        </div>

        <!-- Scoring Guide -->
        <div id="golf-hole-info" class="golf-info-box"></div>

        <!-- Scoreboard -->
        <table id="golf-score">
            <thead id="golf-score-head"></thead>
            <tbody id="golf-score-body"></tbody>
        </table>

    </div>

    <script>
        // BASIC REFERENCES
        const modeSelect   = document.getElementById("game-mode");
        const modeSelectBox = document.getElementById("mode-select");
        const names501     = document.getElementById("names-501");
        const gameArea501  = document.getElementById("game-area-501");
        const golfArea     = document.getElementById("golf-area");
        const golfSetup    = document.getElementById("golf-setup");
        const golfScoreHead = document.getElementById("golf-score-head");
        const golfScoreBody = document.getElementById("golf-score-body");

        let golfPlayers = [];
        let golfCurrentIndex = 0;

        // MODE SWITCH BEHAVIOUR
        modeSelect.addEventListener("change", () => {
            if (modeSelect.value === "golf") {
                // Show golf setup only
                golfArea.classList.remove("hidden");
                golfSetup.classList.remove("hidden");
                names501.classList.add("hidden");
                gameArea501.classList.add("hidden");
            } else {
                // Back to 501 setup
                golfArea.classList.add("hidden");
                golfSetup.classList.add("hidden");
                names501.classList.remove("hidden");
                gameArea501.classList.add("hidden");
            }
        });

        // START GAME BUTTON (TOP)
        function startGame() {
            if (modeSelect.value === "501") {
                // Show 501 area
                gameArea501.classList.remove("hidden");
                golfArea.classList.add("hidden");
                golfSetup.classList.add("hidden");
                names501.classList.add("hidden");
            } else {
                // For Golf, just show golf setup if not already
                golfArea.classList.remove("hidden");
                golfSetup.classList.remove("hidden");
                gameArea501.classList.add("hidden");
                names501.classList.add("hidden");
            }
        }

        // START GOLF WITH VALIDATION + SETUP HIDE
        function startGolf() {
            const names = [];
            for (let i = 1; i <= 8; i++) {
                const val = document.getElementById(`golf-name-${i}`).value.trim();
                if (val !== "") names.push(val);
            }

            if (names.length < 2) {
                alert("Please enter at least TWO player names to start Golf.");
                return;
            }

            golfPlayers = names;
            golfCurrentIndex = 0;

            // Hide setup, show game area
            golfSetup.classList.add("hidden");
            golfArea.classList.remove("hidden");
            modeSelectBox.classList.add("hidden");

            // Build scoreboard and set first player highlight
            buildGolfScoreboard();
            updateGolfTurnHighlight();
        }

        // BUILD GOLF SCOREBOARD (simple: one row per player)
        function buildGolfScoreboard() {
            golfScoreHead.innerHTML = "";
            golfScoreBody.innerHTML = "";

            const headerRow = document.createElement("tr");
            const thName = document.createElement("th");
            thName.textContent = "Player";
            const thTotal = document.createElement("th");
            thTotal.textContent = "Total";
            headerRow.appendChild(thName);
            headerRow.appendChild(thTotal);
            golfScoreHead.appendChild(headerRow);

            golfPlayers.forEach((name, index) => {
                const tr = document.createElement("tr");
                tr.id = `golf-player-row-${index}`;

                const tdName = document.createElement("td");
                tdName.textContent = name;

                const tdTotal = document.createElement("td");
                tdTotal.textContent = "0";
                tdTotal.id = `golf-player-total-${index}`;

                tr.appendChild(tdName);
                tr.appendChild(tdTotal);
                golfScoreBody.appendChild(tr);
            });
        }

        // HIGHLIGHT CURRENT PLAYER + AUTO-SCROLL
        function updateGolfTurnHighlight() {
            for (let i = 0; i < golfPlayers.length; i++) {
                const row = document.getElementById(`golf-player-row-${i}`);
                if (!row) continue;
                if (i === golfCurrentIndex) {
                    row.classList.add("golf-current-player");
                    row.scrollIntoView({ behavior: "smooth", block: "center" });
                } else {
                    row.classList.remove("golf-current-player");
                }
            }
        }

        // ADVANCE TURN (you can call this from your scoring logic)
        function advanceGolfTurn() {
            if (golfPlayers.length === 0) return;
            golfCurrentIndex = (golfCurrentIndex + 1) % golfPlayers.length;
            updateGolfTurnHighlight();
        }

        // BACK TO MENU
        function returnToMenu() {
            golfArea.classList.add("hidden");
            gameArea501.classList.add("hidden");
            golfSetup.classList.add("hidden");
            names501.classList.remove("hidden");
            modeSelectBox.classList.remove("hidden");
            modeSelect.value = "501";
        }

        // OPTIONAL: simple keypad wiring for 501 (if you want to keep using it)
        const scoreInput = document.getElementById("score-input");
        document.querySelectorAll(".kp[data-digit]").forEach(btn => {
            btn.addEventListener("click", () => {
                scoreInput.value = (scoreInput.value || "") + btn.dataset.digit;
            });
        });
        document.getElementById("kp-clear").addEventListener("click", () => {
            scoreInput.value = "";
        });
        // kp-undo / kp-enter would hook into your existing 501 logic
    </script>
</body>
</html>
